<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seyahat Öncesi Yapılacaklar & Alınacaklar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="travel-planner.css">
    <style>
        .checklist-container { max-width:800px; margin:0 auto; padding:32px 24px; }
        .cl-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px; }
        .cl-header a { font-size:0.9rem; display:inline-flex; align-items:center; gap:6px; color:var(--text2); margin-bottom:12px; }
        .cl-header a:hover { color:var(--accent); }
        .cl-stats { background:var(--card); padding:16px 20px; border-radius:var(--r-lg); border:1px solid var(--border); margin-bottom:30px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow); }
        .cl-progress-bar { flex:1; height:8px; background:var(--bg2); border-radius:4px; margin:0 20px; overflow:hidden; }
        .cl-progress-fill { height:100%; background:var(--green); transition:width 0.3s; }
        .cl-category { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); margin-bottom:20px; overflow:hidden; }
        .cl-cat-head { padding:16px 20px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-family:var(--hd); font-weight:600; font-size:1.1rem; }
        .cl-items { padding:10px 0; }
        .cl-item { display:flex; align-items:center; padding:12px 20px; border-bottom:1px solid var(--border); gap:12px; transition:background 0.2s; }
        .cl-item:last-child { border-bottom:none; }
        .cl-item:hover { background:var(--card-hover); }
        .cl-item.done .cl-text { text-decoration:line-through; color:var(--muted); }
        .cl-checkbox { width:22px; height:22px; border:2px solid var(--accent); border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:transparent; transition:all 0.2s; flex-shrink:0; }
        .cl-item.done .cl-checkbox { background:var(--green); border-color:var(--green); color:#fff; }
        .cl-text { flex:1; font-size:0.95rem; cursor:pointer; }
        .cl-del { color:var(--red); cursor:pointer; opacity:0.5; transition:opacity 0.2s; background:none; border:none; padding:4px; font-size:0.9rem; }
        .cl-item:hover .cl-del { opacity:1; }
        .cl-add { display:flex; padding:16px 20px; gap:10px; background:var(--bg); border-top:1px solid var(--border); }
        .cl-add input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:var(--r); background:var(--card); color:var(--text); font-family:var(--bd); outline:none; }
        .cl-add input:focus { border-color:var(--accent); }
        .cl-add button { padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:var(--r); cursor:pointer; font-weight:600; }
        .cl-add button:hover { background:var(--accent-h); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner" style="justify-content:center;">
            <div class="logo">
                <div class="logo-mark"><i class="fas fa-list-check"></i></div>
                <div>
                    <h1>Avrupa Turu Hazırlık Listesi</h1>
                    <small>Seyahat öncesi unutulmaması gerekenler</small>
                </div>
            </div>
        </div>
    </header>

    <div class="checklist-container">
        <div class="cl-header">
            <div>
                <a href="index.html"><i class="fas fa-arrow-left"></i> Rota Planlayıcıya Dön</a>
                <h2 class="sec-title">Alınacaklar & Yapılacaklar</h2>
            </div>
            <button class="theme-btn" id="themeToggle" title="Tema değiştir"><i class="fas fa-moon"></i></button>
        </div>

        <div class="cl-stats">
            <div><strong>İlerleme:</strong> <span id="statText">0/0</span></div>
            <div class="cl-progress-bar"><div class="cl-progress-fill" id="statFill" style="width:0%"></div></div>
            <div style="font-family:var(--mono); color:var(--green); font-weight:600;" id="statPct">0%</div>
        </div>

        <div id="clWrap"></div>
    </div>

    <script src="checklist.js"></script>
</body>
</html>
